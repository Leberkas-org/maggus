version: 2

before:
  hooks:
    - go-winres make --product-version={{.Version}} --file-version={{.Version}}

builds:
  - id: maggus
    binary: maggus
    ldflags:
      - -s -w
      - -X github.com/dirnei/maggus/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  mode: keep-existing

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
